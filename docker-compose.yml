services:
  postgres:
    image: postgres:16-alpine
    container_name: cyber-legends-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cyber_legends}
      POSTGRES_USER: ${POSTGRES_USER:-cyber_legends}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-cyber_legends} -d ${POSTGRES_DB:-cyber_legends}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
