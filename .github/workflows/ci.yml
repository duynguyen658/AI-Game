name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cyber_legends_test
          POSTGRES_USER: cyber_legends
          POSTGRES_PASSWORD: change-me-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cyber_legends -d cyber_legends_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_ENV: testing
      DATABASE_URL: postgresql+asyncpg://cyber_legends:change-me-test@localhost:5432/cyber_legends_test
      LLM_PROVIDER: mock
      JWT_SECRET_KEY: test-jwt-secret
      N8N_WEBHOOK_SECRET: test-webhook-secret
      APPROVAL_TOKEN_SECRET: test-approval-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Ruff
        run: python -m ruff check app tests

      - name: Ruff format
        run: python -m ruff format --check app tests

      - name: Mypy
        run: python -m mypy app

      - name: Bandit
        run: python -m bandit -r app

      - name: Pytest
        run: python -m pytest -v --cov=app --cov-report=term-missing
