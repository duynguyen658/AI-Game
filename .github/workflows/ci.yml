name: CI

on:
  push:
    branches:
      - feature/repository-layer
      - agentic-core
      - feature/m5-policy-memory-actions
      - feature/m6-production-operations
      - feature/m7-applied-ai-workflows
      - feature/m8-frontend-productization
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: OpenAPI generated type drift
        run: pnpm openapi:check
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Unit and component tests
        run: pnpm test
      - name: Production build
        env:
          AUTH_MODE: demo
          DEMO_AUTH_ENABLED: "true"
          ALLOW_PRODUCTION_DEMO: "true"
          SESSION_SECRET: ci-session-secret-at-least-32-characters
          BACKEND_API_URL: http://127.0.0.1:8000
        run: pnpm build
      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Playwright desktop mobile tablet accessibility and visual gates
        run: pnpm test:e2e
      - name: Dependency audit
        run: pnpm audit --audit-level high
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore

  full-stack-e2e:
    needs: [test, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install Playwright dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile && pnpm exec playwright install --with-deps chromium
      - name: Start deterministic demo stack
        run: docker compose -f docker-compose.demo.yml up -d --build
      - name: Verify full-stack health and connectivity
        run: |
          docker compose -f docker-compose.demo.yml ps
          ready=0
          for attempt in {1..60}; do
            if curl --fail http://127.0.0.1:3000/login; then ready=1; break; fi
            sleep 2
          done
          test "$ready" = "1"
      - name: Real BFF backend worker Playwright flows
        working-directory: frontend
        env:
          E2E_FULL_STACK: "1"
          PLAYWRIGHT_EXTERNAL_SERVER: "1"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
        run: pnpm exec playwright test e2e/full-stack.spec.ts --project=chromium
      - name: Compose logs
        if: always()
        run: docker compose -f docker-compose.demo.yml logs --no-color
      - name: Stop deterministic demo stack
        if: always()
        run: docker compose -f docker-compose.demo.yml down -v

  production-auth:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cyber_legends_oidc
          POSTGRES_USER: cyber_legends
          POSTGRES_PASSWORD: oidc-test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cyber_legends -d cyber_legends_oidc"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: testing
      DATABASE_URL: postgresql+asyncpg://cyber_legends:oidc-test-password@127.0.0.1:5432/cyber_legends_oidc
      FRONTEND_DATABASE_URL: postgresql://cyber_legends:oidc-test-password@127.0.0.1:5432/cyber_legends_oidc
      LLM_PROVIDER: mock
      IMAGE_PROVIDER: mock
      JWT_SECRET_KEY: oidc-test-backend-secret-at-least-32-characters
      JWT_ISSUER: http://127.0.0.1:43132
      JWT_AUDIENCE: cyber-legends
      JWT_JWKS_URL: http://127.0.0.1:43132/jwks
      JWT_ALGORITHM: RS256
      AUTH_MODE: oidc
      BACKEND_API_URL: http://127.0.0.1:8000
      SESSION_SECRET: oidc-test-cookie-secret-at-least-32-characters
      OIDC_SESSION_STORAGE: postgres
      OIDC_SESSION_ENCRYPTION_KEY: oidc-test-payload-encryption-key-at-least-32-characters
      OIDC_SESSION_MAX_AGE_SECONDS: "3600"
      OIDC_REFRESH_SKEW_SECONDS: "1"
      AUTH_COOKIE_MAX_BYTES: "3800"
      OIDC_TEST_ISSUER_ENABLED: "true"
      OIDC_ISSUER: http://127.0.0.1:43132
      OIDC_CLIENT_ID: cyber-legends
      OIDC_CLIENT_SECRET: deterministic-test-client-secret
      OIDC_REDIRECT_URI: http://127.0.0.1:43131/api/auth/callback
      OIDC_POST_LOGOUT_REDIRECT_URI: http://127.0.0.1:43131/login
      TEST_OIDC_ISSUER: http://127.0.0.1:43132
      TEST_OIDC_ACCESS_TOKEN_SECONDS: "2"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install production-auth dependencies
        run: |
          python -m pip install -r requirements-dev.txt
          cd frontend && pnpm install --frozen-lockfile && pnpm exec playwright install --with-deps chromium
      - name: Migrate OIDC session storage
        run: alembic upgrade head
      - name: Session refresh rotation concurrency and PostgreSQL tests
        working-directory: frontend
        env:
          RUN_POSTGRES_OIDC_TESTS: "1"
          OIDC_TEST_ISSUER_ENABLED: "false"
        run: pnpm test:auth
      - name: Deterministic OIDC browser login refresh rotation and logout
        run: |
          set -euo pipefail
          node frontend/scripts/test-oidc-issuer.mjs > /tmp/oidc-issuer.log 2>&1 & issuer_pid=$!
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/oidc-api.log 2>&1 & api_pid=$!
          (cd frontend && pnpm dev --hostname 127.0.0.1 --port 43131) > /tmp/oidc-frontend.log 2>&1 & frontend_pid=$!
          trap 'kill $frontend_pid $api_pid $issuer_pid 2>/dev/null || true' EXIT
          for url in http://127.0.0.1:43132/.well-known/openid-configuration http://127.0.0.1:8000/ready http://127.0.0.1:43131/login; do
            ready=0
            for attempt in {1..60}; do
              if curl --fail --silent "$url" >/dev/null; then ready=1; break; fi
              sleep 1
            done
            test "$ready" = "1"
          done
          cd frontend
          E2E_OIDC=1 PLAYWRIGHT_EXTERNAL_SERVER=1 PLAYWRIGHT_BASE_URL=http://127.0.0.1:43131 pnpm test:e2e:oidc
      - name: Production-auth logs
        if: failure()
        run: cat /tmp/oidc-issuer.log /tmp/oidc-api.log /tmp/oidc-frontend.log || true

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cyber_legends_test
          POSTGRES_USER: cyber_legends
          POSTGRES_PASSWORD: change-me-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cyber_legends -d cyber_legends_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_ENV: testing
      DATABASE_URL: postgresql+asyncpg://cyber_legends:change-me-test@localhost:5432/cyber_legends_test
      LLM_PROVIDER: mock
      IMAGE_PROVIDER: mock
      ENABLE_REAL_VIDEO_GENERATION: "false"
      JWT_SECRET_KEY: test-jwt-secret
      N8N_WEBHOOK_SECRET: test-webhook-secret
      APPROVAL_TOKEN_SECRET: test-approval-secret
      METRICS_TOKEN: test-monitoring-secret
      RUN_POSTGRES_TESTS: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Alembic drift check
        run: alembic check

      - name: Ruff
        run: python -m ruff check app tests alembic

      - name: Ruff format
        run: python -m ruff format --check app tests alembic

      - name: Mypy
        run: python -m mypy app

      - name: Bandit
        run: python -m bandit -r app

      - name: Pytest
        run: python -m pytest -v

      - name: Coverage
        run: python -m pytest --cov=app --cov-report=term-missing

      - name: Evaluation regression gate
        run: python -m pytest tests/integration/test_m6_evaluation.py::test_golden_m6_system_dataset_passes_committed_regression_gate -v

      - name: M6 production blocker tests
        run: python -m pytest tests/integration/test_m6_outbox.py tests/integration/test_m6_jobs.py tests/unit/observability/test_observability.py -v

      - name: M7 media persistence and acceptance blocker tests
        run: python -m pytest tests/integration/test_m7_applied_ai.py tests/unit/llm/test_provider_contracts.py tests/unit/integrations tests/unit/applied_workflows tests/unit/media tests/unit/business_impact tests/unit/database/test_m7_integrity.py tests/unit/prompt_management -v

      - name: API and worker smoke
        run: python -c "from app.main import app; from app.jobs.handlers import build_job_handlers; from app.database.session import AsyncSessionLocal; assert app and build_job_handlers(AsyncSessionLocal)"

      - name: Dependency vulnerability scan
        run: python -m pip install pip-audit && python -m pip_audit -r requirements.txt

      - name: Generate Python SBOM
        run: python -m pip_audit -r requirements.txt --format cyclonedx-json --output sbom-python.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom-python
          path: sbom-python.json

  images:
    needs: [test, frontend, full-stack-e2e, production-auth]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate production Compose contract
        env:
          POSTGRES_DB: cyber_legends
          POSTGRES_USER: cyber_legends
          POSTGRES_PASSWORD: ci-production-database-password
          JWT_SECRET_KEY: ci-production-jwt-secret
          JWT_ISSUER: https://identity.example.test
          JWT_AUDIENCE: cyber-legends
          JWT_JWKS_URL: https://identity.example.test/.well-known/jwks.json
          SESSION_SECRET: ci-production-session-secret-at-least-32-characters
          OIDC_SESSION_ENCRYPTION_KEY: ci-production-oidc-encryption-key-at-least-32-characters
          OIDC_ISSUER: https://identity.example.test
          OIDC_CLIENT_ID: cyber-legends
          OIDC_CLIENT_SECRET: ci-production-oidc-secret
          OIDC_REDIRECT_URI: https://app.example.test/api/auth/callback
          OIDC_POST_LOGOUT_REDIRECT_URI: https://app.example.test/login
        run: touch .env && docker compose -f docker-compose.production.yml config --quiet

      - name: Build API image
        run: docker build -f Dockerfile.api -t cyber-legends-api:${{ github.sha }} .

      - name: Build worker image
        run: docker build -f Dockerfile.worker -t cyber-legends-worker:${{ github.sha }} .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t cyber-legends-frontend:${{ github.sha }} frontend

      - name: Smoke frontend image
        run: |
          docker run -d --rm --name cyber-legends-frontend -p 3000:3000 \
            -e AUTH_MODE=demo -e DEMO_AUTH_ENABLED=true -e ALLOW_PRODUCTION_DEMO=true \
            -e SESSION_SECRET=ci-session-secret-at-least-32-characters \
            -e BACKEND_API_URL=http://127.0.0.1:8000 \
            cyber-legends-frontend:${{ github.sha }}
          trap 'docker stop cyber-legends-frontend >/dev/null 2>&1 || true' EXIT
          ready=0
          for attempt in {1..20}; do
            if curl --fail http://127.0.0.1:3000/login; then
              ready=1
              break
            fi
            sleep 1
          done
          test "$ready" = "1"
          docker stop cyber-legends-frontend

      - name: Smoke API image
        run: docker run --rm cyber-legends-api:${{ github.sha }} python -c "from app.main import app; assert app"

      - name: Smoke worker image
        run: docker run --rm cyber-legends-worker:${{ github.sha }} python -c "from app.jobs.handlers import build_job_handlers; from app.database.session import AsyncSessionLocal; assert len(build_job_handlers(AsyncSessionLocal)) >= 12"

      - name: Scan API image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: cyber-legends-api:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Scan worker image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: cyber-legends-worker:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: cyber-legends-frontend:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Generate container SBOM
        uses: anchore/sbom-action@v0.17.2
        with:
          image: cyber-legends-api:${{ github.sha }}
          artifact-name: sbom-api.spdx.json

      - name: Generate worker SBOM
        uses: anchore/sbom-action@v0.17.2
        with:
          image: cyber-legends-worker:${{ github.sha }}
          artifact-name: sbom-worker.spdx.json

      - name: Generate frontend SBOM
        uses: anchore/sbom-action@v0.17.2
        with:
          image: cyber-legends-frontend:${{ github.sha }}
          artifact-name: sbom-frontend.spdx.json
