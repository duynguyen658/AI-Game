name: CI

on:
  push:
    branches:
      - feature/repository-layer
      - agentic-core
      - feature/m5-policy-memory-actions
      - feature/m6-production-operations
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cyber_legends_test
          POSTGRES_USER: cyber_legends
          POSTGRES_PASSWORD: change-me-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cyber_legends -d cyber_legends_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_ENV: testing
      DATABASE_URL: postgresql+asyncpg://cyber_legends:change-me-test@localhost:5432/cyber_legends_test
      LLM_PROVIDER: mock
      JWT_SECRET_KEY: test-jwt-secret
      N8N_WEBHOOK_SECRET: test-webhook-secret
      APPROVAL_TOKEN_SECRET: test-approval-secret
      METRICS_TOKEN: test-monitoring-secret
      RUN_POSTGRES_TESTS: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Alembic drift check
        run: alembic check

      - name: Ruff
        run: python -m ruff check app tests alembic

      - name: Ruff format
        run: python -m ruff format --check app tests alembic

      - name: Mypy
        run: python -m mypy app

      - name: Bandit
        run: python -m bandit -r app

      - name: Pytest
        run: python -m pytest -v

      - name: Coverage
        run: python -m pytest --cov=app --cov-report=term-missing

      - name: Evaluation regression gate
        run: python -m pytest tests/integration/test_m6_evaluation.py::test_golden_m6_system_dataset_passes_committed_regression_gate -v

      - name: M6 production blocker tests
        run: python -m pytest tests/integration/test_m6_outbox.py tests/integration/test_m6_jobs.py tests/unit/observability/test_observability.py -v

      - name: API and worker smoke
        run: python -c "from app.main import app; from app.jobs.handlers import build_job_handlers; from app.database.session import AsyncSessionLocal; assert app and build_job_handlers(AsyncSessionLocal)"

      - name: Dependency vulnerability scan
        run: python -m pip install pip-audit && python -m pip_audit -r requirements.txt

      - name: Generate Python SBOM
        run: python -m pip_audit -r requirements.txt --format cyclonedx-json --output sbom-python.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom-python
          path: sbom-python.json

  images:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t cyber-legends-api:${{ github.sha }} .

      - name: Build worker image
        run: docker build -f Dockerfile.worker -t cyber-legends-worker:${{ github.sha }} .

      - name: Smoke API image
        run: docker run --rm cyber-legends-api:${{ github.sha }} python -c "from app.main import app; assert app"

      - name: Smoke worker image
        run: docker run --rm cyber-legends-worker:${{ github.sha }} python -c "from app.jobs.handlers import build_job_handlers; from app.database.session import AsyncSessionLocal; assert len(build_job_handlers(AsyncSessionLocal)) == 6"

      - name: Scan API image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: cyber-legends-api:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Scan worker image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: cyber-legends-worker:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Generate container SBOM
        uses: anchore/sbom-action@v0.17.2
        with:
          image: cyber-legends-api:${{ github.sha }}
          artifact-name: sbom-api.spdx.json
